services:
  postgres:
    image: postgres:17-alpine
    container_name: kairo-postgres
    restart: unless-stopped
    ports:
      - "${DB_PORT:-5433}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kairopassword}
      POSTGRES_DB: ${POSTGRES_DB:-kairo}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-kairo}"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      target: migrator
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  kairo:
    build:
      context: .
      target: runner
      args:
        NEXT_PUBLIC_URL: ${NEXT_PUBLIC_URL}
        NEXT_PUBLIC_BTC_HTTP_BLOCKBOOK_URL: ${NEXT_PUBLIC_BTC_HTTP_BLOCKBOOK_URL}
        NEXT_PUBLIC_ETH_HTTP_BLOCKBOOK_URL: ${NEXT_PUBLIC_ETH_HTTP_BLOCKBOOK_URL}
    container_name: kairo-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
    depends_on:
      migrate:
        condition: service_completed_successfully

volumes:
  postgres_data:
