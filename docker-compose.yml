services:
  postgres:
    image: postgres:17-alpine
    container_name: kairo-postgres
    restart: unless-stopped
    ports:
      - "${DB_PORT:-5433}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mypassword}
      POSTGRES_DB: ${POSTGRES_DB:-kairo}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env

  migrate:
    build:
      context: .
      target: migrator
    working_dir: /app
    command: pnpm db:migrate
    env_file:
      - .env
    environment:
      DB_HOST: postgres
    depends_on:
      - postgres
    restart: on-failure

  kairo:
    build: .
    container_name: kairo-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DB_HOST: postgres
    depends_on:
      - migrate
      - postgres

volumes:
  postgres_data:
